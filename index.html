<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточки контактов</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      background: linear-gradient(135deg, #4e9af1, #1f78d1);
      color: white;
      font-size: 18px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #1f78d1, #1662b7);
    }

    /* Стили для формы добавления контакта */
    .add-contact-form {
      display: none;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      margin-bottom: 30px;
      width: 300px;
    }

    .add-contact-form h3 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #4e9af1;
      outline: none;
    }

    .form-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .form-buttons button {
      flex: 1;
      font-size: 14px;
      padding: 10px;
    }

    .cancel-btn {
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
    }

    .cancel-btn:hover {
      background: linear-gradient(135deg, #ee5a52, #d63031);
    }

    .contacts-container {
      display: none;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }

    .card {
      width: 300px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s ease;
      padding: 25px 20px;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 4px solid #4e9af1;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 22px;
      color: #333;
    }

    .card p {
      margin: 5px 0;
      font-size: 15px;
      color: #555;
    }

    .email {
      color: #0077cc;
    }

    .phone {
      font-weight: bold;
      color: #222;
    }
  </style>
</head>
<body>

  <div class="controls">
    <button id="show-btn">Посмотреть контакты</button>
    <button id="add-btn">Добавить контакт</button>
  </div>

  <!-- Форма добавления контакта -->
  <div class="add-contact-form" id="add-form">
    <h3>Добавить новый контакт</h3>
    <form id="contact-form">
      <div class="form-group">
        <label for="name">Имя:</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="phone">Телефон:</label>
        <input type="tel" id="phone" required>
      </div>
      <div class="form-group">
        <label for="image">URL изображения:</label>
        <input type="url" id="image" required>
      </div>
      <div class="form-buttons">
        <button type="submit">Добавить</button>
        <button type="button" class="cancel-btn" id="cancel-btn">Отмена</button>
      </div>
    </form>
  </div>

  <!-- Контейнер для карточек -->
  <div class="contacts-container" id="contacts"></div>

  <!-- Шаблон карточки -->
  <template id="contact-card">
    <div class="card">
      <img src="" alt="Фото контакта">
      <h3 class="name">Имя Фамилия</h3>
      <p class="email">example@mail.com</p>
      <p class="phone">+7 (000) 000-00-00</p>
    </div>
  </template>

  <script>
    // Данные контактов
    let contacts = [
      {
        img: "1.jpg",
        name: "Барак Обама",
        email: "Obama@gmail.com",
        phone: "+7 (900) 123-45-67"
      },
      {
        img: "2.jpg",
        name: "Димка Билан",
        email: "Bilan@gmail.com",
        phone: "+7 (901) 234-56-78"
      },
      {
        img: "3.jpg",
        name: "Паша Дуров",
        email: "Durov@gmail.com",
        phone: "+7 (902) 345-67-89"
      },
      {
        img: "4.jpg",
        name: "Илон Маск",
        email: "MaskIlon@gmail.com",
        phone: "+7 (903) 456-78-90"
      }
    ];

    const template = document.getElementById("contact-card");
    const container = document.getElementById("contacts");
    const showButton = document.getElementById("show-btn");
    const addButton = document.getElementById("add-btn");
    const addForm = document.getElementById("add-form");
    const contactForm = document.getElementById("contact-form");
    const cancelButton = document.getElementById("cancel-btn");

    // Функция для отрисовки всех контактов
    function renderContacts() {
      // Очищаем контейнер
      container.innerHTML = '';
      
      // Создаем карточки для каждого контакта
      contacts.forEach(contact => {
        const clone = template.content.cloneNode(true);
        clone.querySelector("img").src = contact.img;
        clone.querySelector("img").alt = contact.name;
        clone.querySelector(".name").textContent = contact.name;
        clone.querySelector(".email").textContent = contact.email;
        clone.querySelector(".phone").textContent = contact.phone;

        container.appendChild(clone);
      });

      // Показываем контейнер
      container.style.display = "flex";
    }

    // Функция для добавления нового контакта
    function addContact(name, email, phone, image) {
      const newContact = {
        img: image,
        name: name,
        email: email,
        phone: phone
      };
      
      // Добавляем контакт в массив
      contacts.push(newContact);
      
      // Перерисовываем контакты
      renderContacts();
      
      // Скрываем форму
      addForm.style.display = "none";
      
      // Очищаем форму
      contactForm.reset();
    }

    // Показ контактов
    showButton.addEventListener("click", () => {
      if (contacts.length > 0) {
        renderContacts();
      }
    });

    // Показ формы добавления
    addButton.addEventListener("click", () => {
      addForm.style.display = "block";
    });

    // Скрытие формы
    cancelButton.addEventListener("click", () => {
      addForm.style.display = "none";
      contactForm.reset();
    });

    // Обработка отправки формы
    contactForm.addEventListener("submit", (e) => {
      e.preventDefault();
      
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const image = document.getElementById("image").value;
      
      if (name && email && phone && image) {
        addContact(name, email, phone, image);
      }
    });
  </script>

</body>
</html>
